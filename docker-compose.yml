# ═══════════════════════════════════════════════════════════════
# Docker Compose — Remote Signature PDF with SoftHSM v2
# ═══════════════════════════════════════════════════════════════
#
# Two-service setup:
#   softhsm   — initializes PKCS#11 token at startup (shared volume)
#   server    — Rust signing server using the HSM token
#
# Usage:
#   docker compose up --build
#
# ═══════════════════════════════════════════════════════════════

services:
  # SoftHSM v2 — initializes token then stays alive
  softhsm:
    build:
      context: .
      dockerfile: docker/softhsm/Dockerfile
    container_name: softhsm-signing
    volumes:
      - hsm-tokens:/var/lib/softhsm/tokens
    # Re-run init at startup to populate the shared volume
    command: >
      sh -c "/opt/init-hsm.sh && echo 'HSM ready' && tail -f /dev/null"
    healthcheck:
      test: ["CMD", "softhsm2-util", "--show-slots"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Signing server (HSM mode)
  server:
    build:
      context: ..
      dockerfile: remote-signature-pdf/docker/server/Dockerfile
    container_name: signing-server
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - SOFTHSM2_CONF=/etc/softhsm2.conf
    volumes:
      - hsm-tokens:/var/lib/softhsm/tokens:ro
      - ./certs/nowina:/opt/certs:ro
    depends_on:
      softhsm:
        condition: service_healthy
    command: >
      /app/remote-signature-pdf server
        --port 8080 --host 0.0.0.0
        --pki-backend hsm
        --pkcs11-lib /usr/lib/softhsm/libsofthsm2.so
        --hsm-slot 0
        --hsm-pin 1234
        --hsm-key-label user-key
        --cert-dir /opt/certs
    restart: unless-stopped

volumes:
  hsm-tokens:
    driver: local

